<!doctype html>
<!-- 文件说明：后端静态首页，只用于提示后端已启动，不是主要业务页面。 -->
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>无人机信息管理系统</title>
  <style>
    /* 后端静态首页样式。这个页面只是提示后端已启动，不是主要业务页面。 */
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      color: #1f2933;
      background: #edf1f5;
      font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
    }

    main {
      width: min(560px, calc(100% - 32px));
      padding: 32px;
      background: #fff;
      border: 1px solid #d8dee7;
      border-radius: 8px;
      box-shadow: 0 18px 60px rgba(31, 41, 51, 0.12);
    }

    h1 {
      margin: 0 0 12px;
      color: #17202a;
      font-size: 26px;
    }

    p {
      margin: 0 0 16px;
      color: #52606d;
      line-height: 1.7;
    }

    code {
      padding: 2px 5px;
      border-radius: 4px;
      color: #17202a;
      background: #edf1f5;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 22px;
    }

    a {
      display: inline-flex;
      min-height: 40px;
      align-items: center;
      justify-content: center;
      padding: 8px 14px;
      color: #fff;
      background: #1f6feb;
      border-radius: 6px;
      font-weight: 700;
      text-decoration: none;
    }

    a.secondary {
      color: #273444;
      background: #fff;
      border: 1px solid #cbd5e1;
    }
  </style>
</head>
<body>
  <!-- 后端根地址访问到的是这个提示页，真正业务页面在 frontend/standalone.html。 -->
  <main>
    <h1>无人机信息管理系统</h1>
    <p>后端服务已经启动。这个地址是后端入口，业务接口位于 <code>/api</code>。</p>
    <p>推荐打开前端页面：<code>frontend/open-standalone.bat</code>。如果使用 Vue 开发服务，请打开 <code>http://localhost:5173</code>。</p>
    <p>默认登录账号：<code>admin / admin123</code></p>
    <div class="actions">
      <a href="/api/auth/me">检查后端接口</a>
      <a class="secondary" href="http://localhost:5173">打开 Vue 前端</a>
    </div>
  </main>
</body>
</html>
